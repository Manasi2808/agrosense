<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>{{ title }}</title>

	<!-- Bootstrap CSS for grid -->
	<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
		integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
	<!-- Font Awesome -->
	<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
	<!-- Custom Modern CSS -->
	<link href="{{ url_for('static', filename='css/modern.css') }}" rel='stylesheet' type='text/css' />

	<link rel="shortcut icon" href="{{ url_for('static', filename='images/leaf-h.ico') }}" />
	<script type="text/JavaScript" src="{{ url_for('static', filename='scripts/cities.js') }}"></script>
</head>

<body class="{% block body_class %}{% endblock %}">

	<!-- Navigation -->
	<nav class="navbar navbar-expand-lg navbar-dark navbar-custom mb-5">
		<div class="container">
			<a class="navbar-brand text-gradient" href="{{ url_for('home') }}">
				<i class="fas fa-leaf text-primary"></i> AgroSense
			</a>
			<button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarResponsive"
				aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="navbarResponsive">
				<ul class="navbar-nav ml-auto gap-3">
					<li class="nav-item">
						<a class="nav-link" href="{{ url_for('home') }}"><i class="fas fa-home me-1"></i> Home</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" href="{{ url_for('crop_recommend') }}"><i class="fas fa-seedling me-1"></i> Crop Recommender</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" href="{{ url_for('crop_insights') }}"><i class="fas fa-book-open me-1"></i> Explore Crops</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" href="{{ url_for('fertilizer_recommendation') }}"><i
								class="fas fa-vial me-1"></i> Fertilizer Info</a>
					</li>

				</ul>
			</div>
		</div>
	</nav>

	<div class="container">
		{% block body %} {% endblock %}
	</div>

	<!-- Scripts -->
	<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
		integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
		crossorigin="anonymous"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
		integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
		crossorigin="anonymous"></script>
	<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
		integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
		crossorigin="anonymous"></script>
</body>

</html>
